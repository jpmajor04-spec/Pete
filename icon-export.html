<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Pete Icon Export</title>
  <style>
    body { margin: 0; background: #888; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 24px; font-family: sans-serif; }
    canvas { border-radius: 230px; box-shadow: 0 12px 48px rgba(0,0,0,0.4); }
    button { padding: 14px 36px; font-size: 18px; background: #b84c2a; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
    p { color: white; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <canvas id="c" width="1024" height="1024"></canvas>
  <button onclick="download()">Download PNG</button>
  <p>Right-click the image above → Save Image As — if the button doesn't work</p>
  <script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function draw() {
    const W = 1024, H = 1024;

    // Background
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#f7f2ea');
    bg.addColorStop(1, '#ede5d4');
    roundRect(0, 0, W, H, 220);
    ctx.fillStyle = bg;
    ctx.fill();

    // Warm accent glow
    const glow = ctx.createRadialGradient(160, 160, 0, 160, 160, 420);
    glow.addColorStop(0, 'rgba(184,76,42,0.09)');
    glow.addColorStop(1, 'rgba(184,76,42,0)');
    ctx.fillStyle = glow;
    roundRect(0, 0, W, H, 220);
    ctx.fill();

    // Pete SVG
    const s0='#c82200', s1='#1a7a3a', s2='#e8be10', s3='#1a3aaa';
    const svgStr = `<svg width="515" height="660"
      viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="30" cy="79" rx="13" ry="2.5" fill="rgba(100,55,15,0.13)"/>
  <rect x="17" y="58" width="8" height="14" rx="4" fill="#e0a870"/>
  <rect x="35" y="58" width="8" height="14" rx="4" fill="#e0a870"/>
  <ellipse cx="21" cy="75.5" rx="10.5" ry="4" fill="#4a2208"/>
  <ellipse cx="21" cy="74" rx="10" ry="3.2" fill="#8b5a30"/>
  <rect x="19" y="68.5" width="4" height="5" rx="1.8" fill="#4a2810"/>
  <rect x="11.5" y="71" width="19" height="3.2" rx="1.6" fill="#5a3010"/>
  <ellipse cx="39" cy="75.5" rx="10.5" ry="4" fill="#4a2208"/>
  <ellipse cx="39" cy="74" rx="10" ry="3.2" fill="#8b5a30"/>
  <rect x="37" y="68.5" width="4" height="5" rx="1.8" fill="#4a2810"/>
  <rect x="29.5" y="71" width="19" height="3.2" rx="1.6" fill="#5a3010"/>
  <rect x="13" y="58" width="15" height="12" rx="4" fill="#c8a850"/>
  <rect x="32" y="58" width="15" height="12" rx="4" fill="#c8a850"/>
  <rect x="27" y="58" width="6" height="12" fill="#c8a850"/>
  <rect x="12" y="57" width="36" height="3" rx="1.5" fill="#9a7828"/>
  <rect x="14.5" y="62.5" width="6" height="5.5" rx="1.5" fill="#b89040"/>
  <rect x="39.5" y="62.5" width="6" height="5.5" rx="1.5" fill="#b89040"/>
  <ellipse cx="30" cy="47" rx="20" ry="16" fill="${s0}"/>
  <clipPath id="pb"><ellipse cx="30" cy="47" rx="20" ry="16"/></clipPath>
  <g clip-path="url(#pb)">
    <rect x="10" y="36" width="40" height="5.5" fill="${s0}"/>
    <rect x="10" y="41.5" width="40" height="5.5" fill="${s1}"/>
    <rect x="10" y="47" width="40" height="5.5" fill="${s2}"/>
    <rect x="10" y="52.5" width="40" height="5.5" fill="${s3}"/>
    <rect x="10" y="58" width="40" height="5.5" fill="${s0}"/>
    <rect x="10" y="63.5" width="40" height="5.5" fill="${s1}"/>
  </g>
  <path d="M26 38 L30 44 L34 38" stroke="white" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <ellipse cx="11" cy="47" rx="5.5" ry="10" fill="${s0}"/>
  <clipPath id="la"><ellipse cx="11" cy="47" rx="5.5" ry="10"/></clipPath>
  <g clip-path="url(#la)">
    <rect x="5" y="41.5" width="12" height="5.5" fill="${s1}"/>
    <rect x="5" y="52.5" width="12" height="5.5" fill="${s2}"/>
  </g>
  <ellipse cx="49" cy="47" rx="5.5" ry="10" fill="${s1}"/>
  <clipPath id="ra"><ellipse cx="49" cy="47" rx="5.5" ry="10"/></clipPath>
  <g clip-path="url(#ra)">
    <rect x="43" y="41.5" width="12" height="5.5" fill="${s0}"/>
    <rect x="43" y="52.5" width="12" height="5.5" fill="${s3}"/>
  </g>
  <circle cx="9" cy="58" r="4.5" fill="#e0a870"/>
  <circle cx="51" cy="58" r="4.5" fill="#e0a870"/>
  <rect x="24.5" y="32" width="11" height="8" rx="4" fill="#e0a870"/>
  <ellipse cx="30" cy="20" rx="18" ry="20" fill="#e0a870"/>
  <ellipse cx="12.5" cy="20" rx="4.5" ry="5.5" fill="#e0a870"/>
  <ellipse cx="47.5" cy="20" rx="4.5" ry="5.5" fill="#e0a870"/>
  <ellipse cx="12.5" cy="20" rx="2.5" ry="3.5" fill="#c8895a"/>
  <ellipse cx="47.5" cy="20" rx="2.5" ry="3.5" fill="#c8895a"/>
  <path d="M17 12 Q30 5 43 12" stroke="#5a3010" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M18 15 Q30 8 42 15" stroke="#5a3010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M17 13 Q15 9 17 7" stroke="#5a3010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M43 13 Q45 9 43 7" stroke="#5a3010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="22" cy="20" r="8" fill="rgba(180,215,255,0.22)" stroke="#3a2010" stroke-width="1.8"/>
  <circle cx="38" cy="20" r="8" fill="rgba(180,215,255,0.22)" stroke="#3a2010" stroke-width="1.8"/>
  <line x1="30" y1="19" x2="30" y2="21" stroke="#3a2010" stroke-width="1.8"/>
  <line x1="13" y1="17" x2="15" y2="19" stroke="#3a2010" stroke-width="1.8"/>
  <line x1="45.5" y1="19" x2="47" y2="17" stroke="#3a2010" stroke-width="1.8"/>
  <circle cx="22" cy="20" r="3.8" fill="#1e1008"/>
  <circle cx="38" cy="20" r="3.8" fill="#1e1008"/>
  <circle cx="23" cy="18.5" r="1.3" fill="white"/>
  <circle cx="39" cy="18.5" r="1.3" fill="white"/>
  <ellipse cx="30" cy="25.5" rx="2.8" ry="2" fill="#c88050"/>
  <path d="M21 31 Q30 39 39 31" stroke="#a85e30" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="20" cy="30" r="1.2" fill="#c88050"/>
  <circle cx="40" cy="30" r="1.2" fill="#c88050"/>
  <ellipse cx="15" cy="26" rx="4.5" ry="3" fill="rgba(220,80,50,0.15)"/>
  <ellipse cx="45" cy="26" rx="4.5" ry="3" fill="rgba(220,80,50,0.15)"/>
</svg>`;

    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);

    img.onload = function() {
      // Pete centered
      ctx.drawImage(img, (W - 515) / 2, 55, 515, 660);
      URL.revokeObjectURL(url);

      // Ground shadow under Pete
      const shadow = ctx.createRadialGradient(W/2, 740, 0, W/2, 740, 210);
      shadow.addColorStop(0, 'rgba(100,55,15,0.20)');
      shadow.addColorStop(1, 'rgba(100,55,15,0)');
      ctx.fillStyle = shadow;
      ctx.beginPath();
      ctx.ellipse(W/2, 740, 210, 36, 0, 0, Math.PI * 2);
      ctx.fill();

      // Open dictionary / book
      drawBook(W, H);
    };
    img.src = url;
  }

  function drawBook(W, H) {
    const bY = 760, bH = 160, spine = W / 2;
    ctx.save();

    // Left page shadow
    ctx.shadowColor = 'rgba(100,55,15,0.22)';
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 6;

    // Left page
    ctx.beginPath();
    ctx.moveTo(spine - 12, bY);
    ctx.lineTo(130, bY + 22);
    ctx.lineTo(120, bY + bH + 10);
    ctx.lineTo(spine - 10, bY + bH);
    ctx.closePath();
    ctx.fillStyle = '#ddd0b0';
    ctx.fill();

    // Right page
    ctx.beginPath();
    ctx.moveTo(spine + 12, bY);
    ctx.lineTo(894, bY + 22);
    ctx.lineTo(904, bY + bH + 10);
    ctx.lineTo(spine + 10, bY + bH);
    ctx.closePath();
    ctx.fillStyle = '#f2ecd8';
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Book spine
    ctx.beginPath();
    ctx.moveTo(spine - 12, bY);
    ctx.lineTo(spine + 12, bY);
    ctx.lineTo(spine + 10, bY + bH);
    ctx.lineTo(spine - 10, bY + bH);
    ctx.closePath();
    ctx.fillStyle = '#5a3010';
    ctx.fill();

    // Page borders
    ctx.strokeStyle = '#b8a07a';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(spine - 12, bY); ctx.lineTo(130, bY + 22);
    ctx.lineTo(120, bY + bH + 10); ctx.lineTo(spine - 10, bY + bH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(spine + 12, bY); ctx.lineTo(894, bY + 22);
    ctx.lineTo(904, bY + bH + 10); ctx.lineTo(spine + 10, bY + bH);
    ctx.stroke();

    // Lines on left page
    ctx.strokeStyle = '#c0a870';
    ctx.lineWidth = 6;
    for (let i = 0; i < 3; i++) {
      const y = bY + 44 + i * 32;
      ctx.beginPath();
      ctx.moveTo(190, y); ctx.lineTo(spine - 30, y - 10);
      ctx.stroke();
    }

    // Lines on right page
    for (let i = 0; i < 3; i++) {
      const y = bY + 44 + i * 32;
      ctx.beginPath();
      ctx.moveTo(spine + 30, y - 10); ctx.lineTo(834, y);
      ctx.stroke();
    }

    // "PETE" on right page, italic serif
    ctx.font = 'bold italic 42px Georgia, serif';
    ctx.fillStyle = '#8a6a10';
    ctx.fillText('PETE', 650, bY + 112);

    ctx.restore();
  }

  draw();

  function download() {
    // Use setTimeout to ensure canvas is fully rendered
    setTimeout(() => {
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = 'pete-icon-1024.png';
        a.href = url;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }, 100);
  }
  </script>
</body>
</html>
