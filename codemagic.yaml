workflows:
  ios-distribution:
    name: Pete iOS Distribution
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - ios-credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.jesse.peteapp"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps @capacitor/core @capacitor/cli @capacitor/ios @capacitor/push-notifications @capacitor-firebase/messaging
      - name: Copy web files to www
        script: |
          mkdir -p www
          cp app.js firebase.js index.html pete.js quiz.js style.css words.js www/
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create \
            --delete-stale-profiles
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-marketing-version 1.4
          agvtool new-version -all $BUILD_NUMBER
          echo "Build number set to $BUILD_NUMBER"
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
